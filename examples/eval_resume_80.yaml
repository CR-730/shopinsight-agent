# 人工编写的简历级评测集。
# 80 条均为可回答的真实分析问题，同时用于 A→B 召回对照与后续 C→D 端到端对照。
# 安全阻断和异常路径由独立测试覆盖，不混入两个简历主指标的统计口径。

- id: r01_total_quantity
  query: 统计全部订单一共卖出了多少件商品
  suite: realistic
  difficulty: easy
  capabilities: [rag_column_recall, rag_metric_recall, sql_generation]
  tags: [metric, single_table]
  expected_columns: [fact_order.order_quantity]
  expected_metrics: [TOTAL_QUANTITY]
  oracle_sql: "SELECT SUM(order_quantity) AS total_quantity FROM fact_order"

- id: r02_order_count
  query: 一共有多少笔订单
  suite: realistic
  difficulty: easy
  capabilities: [rag_column_recall, rag_metric_recall, sql_generation]
  tags: [metric, count]
  expected_columns: [fact_order.order_id]
  expected_metrics: [ORDER_COUNT]
  oracle_sql: "SELECT COUNT(DISTINCT order_id) AS order_count FROM fact_order"

- id: r03_average_quantity
  query: 统计每笔订单平均购买件数
  suite: realistic
  difficulty: easy
  capabilities: [rag_column_recall, rag_metric_recall, sql_generation]
  tags: [metric, average]
  expected_columns: [fact_order.order_quantity]
  expected_metrics: [AVG_QUANTITY]
  oracle_sql: "SELECT AVG(order_quantity) AS average_quantity FROM fact_order"

- id: r04_customer_count_by_region
  query: 按大区统计下单客户数
  suite: realistic
  difficulty: easy
  capabilities: [rag_column_recall, rag_metric_recall, sql_generation]
  tags: [dimension, group_by, region]
  expected_columns: [fact_order.customer_id, fact_order.region_id, dim_region.region_id, dim_region.region_name]
  expected_metrics: [CUSTOMER_COUNT]
  oracle_sql: "SELECT dr.region_name, COUNT(DISTINCT fo.customer_id) AS customer_count FROM fact_order fo JOIN dim_region dr ON fo.region_id = dr.region_id GROUP BY dr.region_name"

