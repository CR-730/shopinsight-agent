- id: conv_metric_and_region_followup
  suite: regression
  difficulty: medium
  capabilities:
    - conversation_memory
    - followup_rewrite
    - metric_inheritance
    - condition_override
  tags:
    - multiturn
    - metric_inheritance
    - region_override
  risk_points:
    - 第二轮只换地区时必须继承上一轮 GMV 指标
  turns:
    - query: 统计华北地区 GMV
      expected_conversation_id: same
      expected_rewritten:
        mode: unchanged
        contains:
          - 华北
          - GMV
      expected_memory:
        snapshot_write: true
        snapshot_metric: GMV
        snapshot_filters:
          - 华北
      expected_trace:
        metric_bindings:
          - GMV
        resolved_filters:
          - 华北
        time_binding: null
        blocked_by: null
        final_answer: required
    - query: 那华东呢
      expected_conversation_id: same
      expected_rewritten:
        mode: rewritten
        contains:
          - GMV
          - 华东
        forbidden_contains:
          - 华北
      expected_memory:
        snapshot_write: true
        snapshot_metric: GMV
        snapshot_filters:
          - 华东
      expected_trace:
        metric_bindings:
          - GMV
        resolved_filters:
          - 华东
        time_binding: null
        blocked_by: null
        final_answer: required

