- id: conv_user_isolation_recreates_conversation
  suite: adversarial
  difficulty: hard
  capabilities:
    - conversation_memory
    - conversation_isolation
  tags:
    - multiturn
    - user_isolation
  risk_points:
    - 同一个 conversation_id 换 user_id 不能读取或继承原用户快照
  turns:
    - query: 统计华北地区 GMV
      user_id: user-a
      expected_conversation_id: new
      expected_rewritten:
        mode: unchanged
        contains:
          - 华北
          - GMV
      expected_memory:
        snapshot_write: true
        snapshot_metric: GMV
        snapshot_filters:
          - 华北
      expected_trace:
        metric_bindings:
          - GMV
        resolved_filters:
          - 华北
        blocked_by: null
        final_answer: required
    - query: 那华东呢
      user_id: user-b
      supplied_conversation_id: previous
      expected_conversation_id: new
      expected_rewritten:
        mode: needs_context
        contains:
          - 那华东呢
        forbidden_contains:
          - GMV
          - 华北
      expected_memory:
        snapshot_write: false
        snapshot_source: isolated_empty
      expected_trace:
        blocked_by: semantic_guard
        final_answer: absent

- id: conv_sql_exception_does_not_pollute_snapshot
  suite: regression
  difficulty: medium
  capabilities:
    - conversation_memory
    - snapshot_pollution_guard
  tags:
    - multiturn
    - sql_exception
    - mocked
  risk_points:
    - SQL 超时或执行异常不能覆盖上一轮成功 snapshot
  runner: mock
  turns:
    - query: 统计华北地区 GMV
      expected_conversation_id: same
      expected_rewritten:
        mode: unchanged
        contains:
          - 华北
          - GMV
      expected_memory:
        snapshot_write: true
        snapshot_metric: GMV
        snapshot_filters:
          - 华北
      expected_trace:
        metric_bindings:
          - GMV
        resolved_filters:
          - 华北
        blocked_by: null
        final_answer: required
    - query: 那华东呢
      simulate:
        exception_stage: tool_execution
        error: SQL 执行超时
      expected_conversation_id: same
      expected_rewritten:
        mode: rewritten
        contains:
          - GMV
          - 华东
        forbidden_contains:
          - 华北
      expected_memory:
        snapshot_write: false
        snapshot_unchanged_from_turn: 1
      expected_trace:
        exception_stage: tool_execution
        error_contains: SQL 执行超时
        final_answer: absent

