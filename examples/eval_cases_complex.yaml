- id: complex_dimension_mismatch
  query: 统计一下一季度各大区的GMV排名
  business_source: 刁钻提问-维度不匹配
  suite: complex
  difficulty: hard
  capabilities:
  - rag_value_hybrid_recall
  - sql_generation
  - tool_execution
  - safety_guard
  tags:
  - corner_case
  - time_dimension
  risk_points:
  - time_mapping_hallucination
  - semantic_alignment
  expected_sql_contains:
  - Q1
  - region_name
  - order_amount
  expected_columns:
  - fact_order.order_amount
  - dim_region.region_name
  - dim_date.quarter
  expected_metrics:
  - GMV
  expected_result:
    mode: success_or_empty
  forbidden_sql:
  - between '2026-01-01' and '2026-03-31'
  must_call_tools:
  - mysql.dw.execute

